name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go test and vet
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Go 1.26.5
        uses: actions/setup-go@v7
        with:
          go-version: '1.26.5'
          cache: false

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...
